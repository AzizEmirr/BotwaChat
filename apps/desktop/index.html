<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Catwa" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Catwa</title>
    <style>
      #catwa-startup-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #11131f;
        opacity: 1;
        transition: opacity 260ms ease;
      }

      #catwa-startup-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #catwa-startup-splash img {
        width: 112px;
        height: 112px;
        border-radius: 28px;
        object-fit: contain;
        filter: drop-shadow(0 14px 32px rgba(2, 6, 23, 0.45));
      }

      @media (max-width: 420px) {
        #catwa-startup-splash img {
          width: 96px;
          height: 96px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="catwa-startup-splash" aria-hidden="true">
      <img alt="" src="/logo.png" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
