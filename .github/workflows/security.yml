name: Security

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Download dependencies
        run: go mod download

      - name: Install scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run gosec (SARIF)
        run: |
          gosec -quiet -severity medium -confidence medium -fmt sarif -out gosec.sarif ./...

      - name: Check SARIF has findings
        id: sarif_check
        run: |
          if [ ! -f gosec.sarif ]; then
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HAS_RESULTS="$(python3 - << 'PY'
import json
from pathlib import Path

path = Path("gosec.sarif")
try:
    data = json.loads(path.read_text(encoding="utf-8"))
except Exception:
    print("false")
    raise SystemExit(0)

runs = data.get("runs") or []
has_results = any((run.get("results") or []) for run in runs)
print("true" if has_results else "false")
PY
          )"
          echo "has_results=${HAS_RESULTS}" >> "$GITHUB_OUTPUT"

      - name: Upload gosec report
        if: steps.sarif_check.outputs.has_results == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: apps/server/gosec.sarif

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"
        with:
          args: "--no-git --config=.gitleaks.toml --redact"
